<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最新羽球賽事｜2026 台灣與國際</title>
  <style>
    :root {
      --bg: #0c1218;
      --panel: #151f2e;
      --panel-2: #1e2d42;
      --border: #2d4158;
      --text: #e8f0f8;
      --muted: #8ba4be;
      --accent: #34d399;
      --accent-2: #6ee7b7;
      --blue: #5eb3ff;
      --warm: #fcd34d;
      --shuttle: #fbbf24;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at top, rgba(251, 191, 36, 0.09), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .wrap { max-width: 1020px; margin: 0 auto; padding: 28px 20px 56px; }

    h1 { margin: 0 0 8px; font-size: clamp(1.4rem, 2.4vw, 1.95rem); }
    h2 { margin: 0 0 12px; font-size: 1.1rem; color: var(--accent-2); }

    .subtitle { color: var(--muted); max-width: 820px; }
    .meta { font-size: 0.85rem; color: var(--muted); margin: 10px 0 18px; }
    .related { font-size: 0.9rem; margin-bottom: 16px; }
    .related a { color: var(--blue); }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin: 16px 0;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .stat .n { font-size: 1.5rem; font-weight: 800; color: var(--shuttle); }
    .stat .l { font-size: 0.78rem; color: var(--muted); }

    .toolbar, .filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0; }
    .filters button, .toolbar button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 14px;
      cursor: pointer;
      font: inherit;
      font-size: 0.85rem;
    }
    .filters button.active {
      background: var(--shuttle);
      color: #422006;
      border-color: var(--shuttle);
      font-weight: 700;
    }
    .btn-accent {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #064e3b;
      border: 0;
      font-weight: 700;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
      margin-bottom: 16px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { border: 1px solid var(--border); padding: 10px; text-align: left; vertical-align: top; }
    th { background: var(--panel-2); color: var(--accent-2); position: sticky; top: 0; }

    .table-wrap { overflow-x: auto; max-height: 70vh; overflow-y: auto; border-radius: 12px; border: 1px solid var(--border); }

    .badge {
      display: inline-block;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .st-upcoming { background: rgba(94, 179, 255, 0.2); color: var(--blue); }
    .st-ongoing { background: rgba(52, 211, 153, 0.25); color: var(--accent); }
    .st-ended { background: rgba(139, 164, 190, 0.2); color: var(--muted); }
    .st-tbd { background: rgba(251, 191, 36, 0.2); color: var(--warm); }

    .type-dom { color: var(--shuttle); }
    .type-int { color: var(--blue); }

    a.ext { color: var(--blue); text-decoration: none; }
    a.ext:hover { text-decoration: underline; }

    .highlight {
      background: rgba(252, 211, 77, 0.08);
      border: 1px solid rgba(252, 211, 77, 0.25);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.9rem;
    }

    .disclaimer {
      background: rgba(251, 191, 36, 0.08);
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.86rem;
      margin-bottom: 16px;
    }

    tr.star { background: rgba(251, 191, 36, 0.06); }
    tr.bookmarked { outline: 1px solid rgba(52, 211, 153, 0.4); }

    footer { text-align: center; color: var(--muted); font-size: 0.82rem; margin-top: 20px; }
  </style>
</head>

  <script>
    const BOOKMARK_KEY = 'badminton-events-bookmark-v1';
    const STATUS_LABEL = {
      upcoming: '即將舉行',
      ongoing: '進行中',
      ended: '已結束',
      tbd: '待公告'
    };
    const TYPE_LABEL = { domestic: '國內', international: '國際' };

    let data = JSON.parse(document.getElementById('tournament-data').textContent);
    let typeFilter = 'all';
    let statusFilter = 'active';

    function fmtRange(start, end) {
      const s = start.slice(5).replace('-', '/');
      const e = end.slice(5).replace('-', '/');
      return start.slice(0, 4) === end.slice(0, 4)
        ? `${start.slice(0, 4)}/${s}～${e}`
        : `${start.replace(/-/g, '/')}～${end.replace(/-/g, '/')}`;
    }

    function loadBookmarks() {
      try { return JSON.parse(localStorage.getItem(BOOKMARK_KEY)) || {}; }
      catch { return {}; }
    }
    function saveBookmarks(b) { localStorage.setItem(BOOKMARK_KEY, JSON.stringify(b)); }

    function recomputeStatus(ev) {
      if (ev.status === 'tbd' || ev.id.includes('-tbd')) return 'tbd';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const s = new Date(ev.start + 'T00:00:00');
      const e = new Date(ev.end + 'T23:59:59');
      if (today < s) return 'upcoming';
      if (today >= s && today <= e) return 'ongoing';
      return 'ended';
    }

    function filteredEvents() {
      return data.events.filter(ev => {
        const st = recomputeStatus(ev);
        if (typeFilter !== 'all' && ev.type !== typeFilter) return false;
        if (statusFilter === 'active') return st === 'upcoming' || st === 'ongoing';
        if (statusFilter !== 'all' && st !== statusFilter) return false;
        return true;
      }).sort((a, b) => a.start.localeCompare(b.start));
    }

    function renderStats() {
      const counts = { upcoming: 0, ongoing: 0, ended: 0, tbd: 0 };
      data.events.forEach(ev => { counts[recomputeStatus(ev)]++; });
      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="n">${counts.ongoing}</div><div class="l">進行中</div></div>
        <div class="stat"><div class="n">${counts.upcoming}</div><div class="l">即將舉行</div></div>
        <div class="stat"><div class="n">${counts.tbd}</div><div class="l">待公告</div></div>
        <div class="stat"><div class="n">${counts.ended}</div><div class="l">已結束</div></div>`;
    }

    function renderTable() {
      const bm = loadBookmarks();
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      filteredEvents().forEach(ev => {
        const st = recomputeStatus(ev);
        const tr = document.createElement('tr');
        if (ev.note && ev.note.includes('★')) tr.classList.add('star');
        if (bm[ev.id]) tr.classList.add('bookmarked');
        tr.innerHTML = `
          <td><input type="checkbox" data-id="${ev.id}" ${bm[ev.id] ? 'checked' : ''} title="我的訂閱"></td>
          <td><span class="badge st-${st}">${STATUS_LABEL[st]}</span></td>
          <td class="type-${ev.type === 'domestic' ? 'dom' : 'int'}">${TYPE_LABEL[ev.type]}</td>
          <td><a class="ext" href="${ev.url}" target="_blank" rel="noopener">${ev.name}</a><br><span style="font-size:0.78rem;color:var(--muted)">${ev.level}</span></td>
          <td>${fmtRange(ev.start, ev.end)}</td>
          <td>${ev.location}</td>
          <td>${ev.age}</td>
          <td style="font-size:0.82rem;color:var(--muted)">${ev.note}</td>`;
        tr.querySelector('input').addEventListener('change', e => {
          bm[ev.id] = e.target.checked;
          saveBookmarks(bm);
          renderTable();
        });
        tbody.appendChild(tr);
      });
    }

    function renderFocus() {
      const focus = data.events.filter(ev => {
        const st = recomputeStatus(ev);
        return (st === 'upcoming' || st === 'ongoing') && ev.start <= '2026-08-31';
      }).sort((a, b) => a.start.localeCompare(b.start));
      const lines = focus.map(ev => {
        const st = STATUS_LABEL[recomputeStatus(ev)];
        return `<strong>${ev.name}</strong>（${st}，${fmtRange(ev.start, ev.end)}，${ev.location}）`;
      });
      document.getElementById('focusBox').innerHTML = lines.length
        ? '<ul><li>' + lines.join('</li><li>') + '</li></ul>'
        : '目前無符合條件之賽事。';
    }

    function exportIcs() {
      const bm = loadBookmarks();
      const list = data.events.filter(ev => bm[ev.id]);
      if (!list.length) { alert('請先勾選★訂閱至少一場賽事'); return; }
      const lines = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//運動平台專案//羽球賽事//ZH'];
      list.forEach(ev => {
        const dtStart = ev.start.replace(/-/g, '');
        const dtEnd = ev.end.replace(/-/g, '');
        lines.push('BEGIN:VEVENT', `UID:${ev.id}@sport-platform`, `DTSTART;VALUE=DATE:${dtStart}`, `DTEND;VALUE=DATE:${dtEnd}`,
          `SUMMARY:${ev.name}`, `LOCATION:${ev.location}`, `DESCRIPTION:${ev.note}`, 'END:VEVENT');
      });
      lines.push('END:VCALENDAR');
      const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'badminton-events.ics';
      a.click();
    }

    document.getElementById('updatedDate').textContent = data.updated || '—';
    document.getElementById('todayDate').textContent = new Date().toLocaleDateString('zh-TW');

    document.getElementById('typeFilters').addEventListener('click', e => {
      if (e.target.tagName !== 'BUTTON') return;
      document.querySelectorAll('#typeFilters button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      typeFilter = e.target.dataset.type;
      renderTable();
    });
    document.getElementById('statusFilters').addEventListener('click', e => {
      if (e.target.tagName !== 'BUTTON') return;
      document.querySelectorAll('#statusFilters button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      statusFilter = e.target.dataset.status;
      renderTable();
    });
    document.getElementById('exportIcs').addEventListener('click', exportIcs);
    document.getElementById('clearBookmarks').addEventListener('click', () => {
      if (confirm('清除所有訂閱？')) { localStorage.removeItem(BOOKMARK_KEY); renderTable(); }
    });

    renderStats();
    renderTable();
    renderFocus();
  </script>
</body>
